name: Stock Monitor Stable Runner

on:
  workflow_dispatch:
  push:

permissions:
  contents: write

jobs:
  run-job:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run script (weekday + time control)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # UTC 時間
          HOUR=$(date -u +%H)
          WEEKDAY=$(date -u +%u)  # 1=Monday, 7=Sunday

          echo "UTC HOUR=$HOUR, WEEKDAY=$WEEKDAY"

          # ✅ 平日 + 指定時間 (10,11 UTC = 台灣18,19)
          if [ "$WEEKDAY" -ge 1 ] && [ "$WEEKDAY" -le 5 ] && \
             ( [ "$HOUR" -eq 10 ] || [ "$HOUR" -eq 11 ] ); then

            echo "✅ match condition → run script"
            python3 push_task.py

          else
            echo "⏰ skip (not target time)"
          fi

      - name: Wait 40 seconds (testing loop)
        run: sleep 60

      - name: Trigger next run
        run: |
          echo "Trigger next run..."

          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/test.yml/dispatches \
            -d '{"ref":"main"}'
