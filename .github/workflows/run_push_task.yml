name: Stock Monitor Scheduled Push

on:
  schedule:
    # 每天台灣時間 20:30 (UTC 12:30) 執行
    - cron: '30 12 * * *'
    # 每天台灣時間 21:00 (UTC 13:00) 執行
    - cron: '0 13 * * *'
  
  # 加入 workflow_dispatch 讓你可以隨時在 GitHub 網頁上手動點擊執行，方便測試
  workflow_dispatch: 

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
      # 1. 取得儲存庫的程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Python 環境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # 你可以依據你的開發環境調整版本 (例如 '3.9' 或 '3.11')

      # 3. 安裝必要的套件 (如果 push_task.py 有使用外部套件)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 如果你有 requirements.txt，請把下面這行的註解拿掉：
          pip install -r requirements.txt

      # 4. 執行你的 Python 腳本
      - name: Run push_task.py
        run: python push_task.py
