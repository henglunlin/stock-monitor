name: Execute Push Task

on:
  schedule:
    # 每天台灣時間 20:30 (UTC 12:30) 執行
    - cron: '30 12 * * *'
    # 每天台灣時間 21:00 (UTC 13:00) 執行
    - cron: '0 13 * * *'
  
  # 允許在 GitHub 網頁上手動點擊執行
  workflow_dispatch: 

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
      # 1. 取得儲存庫的程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 設定 Python 環境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. 安裝必要的套件
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 執行腳本並帶入 Telegram 權限金鑰
      - name: Execute script
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python push_task.py
